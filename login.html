<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員登入 - BookSeller's</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #eaeef1;
            --accent-color: #2d7c19;
            --text-dim: #666666;
            --glass-bg: #ffffff;
            --glass-border: rgba(0, 0, 0, 0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', 'Noto Sans TC', sans-serif; 
            background: var(--bg-color); 
            color: #333333; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Elements */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(45,124,25,0.06) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: -1;
            filter: blur(50px);
        }
        .glow-1 { top: -10%; left: -10%; animation: float 15s infinite alternate; }
        .glow-2 { bottom: -10%; right: -10%; animation: float 20s infinite alternate-reverse; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(100px, 100px); }
        }

        .login-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            width: 100%;
            max-width: 450px;
            padding: 60px 40px;
            border: 1px solid var(--glass-border);
            border-radius: 6px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-link { display: inline-block; margin-bottom: 30px; transition: 0.3s; }
        .logo-link:hover { transform: scale(1.1); }
        .logo { width: 70px; border-radius: 50%; }

        h2 { 
            font-family: 'Lora', serif; 
            font-size: 2rem; 
            font-weight: bold; 
            margin-bottom: 10px; 
            letter-spacing: 2px;
            color: var(--accent-color);
        }
        .subtitle { color: var(--text-dim); margin-bottom: 40px; font-size: 0.85rem; letter-spacing: 1px; }

        .form-group { text-align: left; margin-bottom: 25px; position: relative; }
        .form-group label { 
            display: block; 
            font-family: 'Lora', serif; 
            font-size: 0.75rem; 
            font-weight: bold; 
            color: var(--text-dim); 
            margin-bottom: 10px; 
            letter-spacing: 1.5px;
        }
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.9rem; }
        .form-group input { 
            width: 100%; 
            padding: 15px 15px 15px 45px; 
            background: #ffffff; 
            border: 1px solid #cccccc; 
            color: #333333; 
            border-radius: 4px; 
            outline: none; 
            transition: 0.3s; 
            font-size: 0.95rem;
        }
        .form-group input:focus { border-color: var(--accent-color); box-shadow: 0 0 8px rgba(45, 124, 25, 0.15); }

        .captcha-row { display: flex; gap: 15px; margin-top: 5px; }
        .captcha-display { 
            flex: 1; 
            background: #f5f7f8; 
            color: var(--accent-color); 
            font-family: 'Lora', serif; 
            font-size: 1.2rem; 
            font-weight: bold;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            letter-spacing: 6px; 
            cursor: pointer; 
            border: 1px solid #cccccc;
            border-radius: 4px;
            user-select: none;
            transition: 0.3s;
        }
        .captcha-display:hover { background: #eef1f2; }
        .captcha-input { flex: 1.2; padding-left: 15px !important; }

        .btn-login { 
            width: 100%; 
            padding: 18px; 
            background: var(--accent-color); 
            color: white; 
            border: none; 
            font-family: 'Lora', serif; 
            font-weight: bold; 
            font-size: 1rem; 
            cursor: pointer; 
            transition: 0.3s; 
            letter-spacing: 3px; 
            margin-top: 15px;
            border-radius: 4px;
            box-shadow: 0 4px 10px rgba(45, 124, 25, 0.15);
        }
        .btn-login:hover { background: #1e5210; transform: translateY(-2px); box-shadow: 0 6px 15px rgba(45, 124, 25, 0.25); }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled { background: #cccccc; color: #888888; cursor: not-allowed; transform: none; box-shadow: none; }

        .footer-links { margin-top: 35px; color: var(--text-dim); font-size: 0.85rem; line-height: 2; }
        .footer-links a { color: var(--accent-color); text-decoration: none; font-weight: bold; transition: 0.3s; }
        .footer-links a:hover { color: #ff0000; }
        
        .back-home { display: block; margin-top: 20px; opacity: 0.7; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-dim); text-decoration: none; }
        .back-home:hover { opacity: 1; color: var(--accent-color); }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container { padding: 40px 25px; }
            h2 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="login-container">
        <a href="index.html" class="logo-link">
            <img src="pic/logo.png" alt="BookSeller's Logo" class="logo">
        </a>
        <h2>會員登入</h2>
        <p class="subtitle">請輸入您的帳號密碼以開始閱讀與選購</p>
        
        <div class="form-group">
            <label>帳號 (電子信箱)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" placeholder="name@example.com" required>
            </div>
        </div>

        <div class="form-group">
            <label>密碼</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
        </div>

        <div class="form-group">
            <label>驗證碼</label>
            <div class="captcha-row">
                <input type="text" id="captcha-input" class="captcha-input" placeholder="輸入右側驗證碼">
                <div id="captcha-display" class="captcha-display" title="點擊換一張">1234</div>
            </div>
        </div>
        
        <button id="btn-login" class="btn-login">登入會員</button>
        
        <div class="footer-links">
            還沒有帳號嗎？ <a href="signup.html">立即註冊</a>
            <br>
            <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> 返回書城首頁</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyC-LcCfcPYCYAQZ7n45YCe6tCY_jb-ygvI", authDomain: "sonicboom-shop.firebaseapp.com", projectId: "sonicboom-shop", storageBucket: "sonicboom-shop.firebasestorage.app", messagingSenderId: "976804831944", appId: "1:976804831944:web:6ede6a95196478bd49bbfd", measurementId: "G-3FEKWL0QXZ" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let currentCaptcha = "";
        function generateCaptcha() {
            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let result = "";
            for(let i=0; i<4; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            currentCaptcha = result;
            document.getElementById('captcha-display').innerText = result;
        }

        generateCaptcha();
        document.getElementById('captcha-display').addEventListener('click', generateCaptcha);

        document.getElementById('btn-login').addEventListener('click', () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captcha-input').value.toUpperCase();

            if(!email || !password) { alert("請填寫信箱與密碼！"); return; }
            if(captchaInput !== currentCaptcha) {
                alert("驗證碼錯誤，請重新輸入！");
                generateCaptcha();
                document.getElementById('captcha-input').value = "";
                return;
            }

            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> 正在驗證登入資訊...';
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    const user = userCredential.user;
                    const name = user.displayName || user.email.split('@')[0];
                    window.location.href = "index.html?login_success=true&name=" + encodeURIComponent(name);
                })
                .catch((error) => {
                    console.error(error);
                    alert("登入失敗：帳號或密碼錯誤");
                    generateCaptcha();
                    btn.innerHTML = '登入會員';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
